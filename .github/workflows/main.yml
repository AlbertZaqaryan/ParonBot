name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Copy files to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "."
        target: "/home/ubuntu/ParonBot"

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          mv /home/ubuntu/.env /home/ubuntu/ParonBot/.env
          cd /home/ubuntu/ParonBot

          sudo docker stop bot || true
          sudo docker rm bot || true

          sudo docker build -t bot .
          
          sudo docker run -d \
            --name bot \
            --restart always \
            --env-file /home/ubuntu/ParonBot/.env \
            bot
